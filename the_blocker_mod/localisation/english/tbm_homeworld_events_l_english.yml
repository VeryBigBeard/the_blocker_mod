 ### 6. Advanced Geothermal Tap Shutdown

 tbm_hw.6_name:0 "Geothermal Plant Shutdown"
 tbm_hw.6_desc_gestalt:0 "By the mid-21st century, we had hoped geothermal power would sate growing energy needs. This estimate proved incorrect and many older §Y£blocker_yellow£ $d_experimental_geothermal_tap$s§! have long since been been shut down due to failing efficiency scores.\n\nA few, however, remain, creaking out heating rods and turning creaking steam engines to help increase strategic energy reserves. Newly developed evaluations algorithms have revealed serious problems with aging pre-nanocomposite gantries might collapse, causing unacceptable structural damage to the area surrounding the tap.\n\nIt would be more efficient to dismantle the few of these reactors still in use. They are, however, still considered part of our potential £district_generator£ capacity."
 tbm_hw.6_desc:0 "By the mid-21st century, geothermal power was supposed to solve all of our energy needs. The Great Energy Conflict of 2102 disabused most everyone of any such notion, and many of the older §Y£blocker_yellow£ $d_experimental_geothermal_tap$s§! have long since been been shut down or converted into fracking sites.\n\nA few, however, remain, creaking out heating rods and turning cranky steam engines like monsters from historic films. Some are closer to museums than generators, and cater mainly to school trips these days.\n\nRecent safety inspections at one such plant have raised new serious concerns that aging pre-nanocomposite gantries might collapse, trapping [owner.GetSpawnNamePlural] in the reactor pits overnight without supervision.\n\nA proposal has been put forward to dismantle the few of these reactors still in use. They are, however, still considered part of our potential $district_generator$ capacity, and lobbyists for the energy supply have expressed concerns about tightening the strategic reserve."
 tbm_hw.6_decommission:0 "Dismantle the remaining facilities."
 tbm_hw.6_lose_generator:0 "The §Y£blocker_yellow£ $d_experimental_geothermal_tap$§! will be removed. An $d_active_volcano$ will be added in its place.\n"
 tbm_hw.6_maintain:0 "Bring the facilities back up to code."
 tbm_hw.6_nanocomppsite_shortage:0 "We will divert the necessary nanocomposites to rejuvenate the generators, maintaining our number of £district£ §Y$district_generator_plural$§! at the expense of shipyard efficiency."
 tbm_hw.6_ignore:0 "Ignore the problem."
 tbm_hw.6_ignore_tooltip:0 "The §Y£blocker_yellow£ Experimental Geothermal Tap§! will stop working, and §Ywe will lose a £district£ $district_generator$ slot§! as a result."

 tbm_hw.7_name:0 "Geothermal Explosion"
 tbm_hw.7_desc:0 "Back in the 21st century, geothermal energy wasn't considered dangerous. But the scale on which the larger §Y£blocker_yellow£ Experimental Geothermal Tap§!s operate can lead to the relase of dangerous levels of heat and gas from deep in the [from.GetPlanetMoon]'s crust if not properly maintained.\n\nAfter decades of neglect and decay, one ofthe §Y£blocker_yellow£ Experimental Geothermal Tap§! on [from.GetName] suddenly exploded, causing significant damage to the surrounding $district_city_plural$ and spewing noxious gases across much of the region.\n\nClean-up is underway, but the technology behind this form of energy generation has now been entirely deprecated and banned from large-scale use in future energy generators."

 ### Post-Apocalyptic - Environmental Remediation Event Chain
 
 tbm_environmental_remediation:0 "Post-Apocalyptic — Environmental Restoration"
 tbm_environmental_remediation_desc:0 "Long years ago, civilization vanished overnight in a cloud of ash and debris. Since then, every undertaking has been oriented towards one critical goal: restoring the homeworld, rebuilding what once was and, perhaps, exceeding it — if the mistakes of the past can indeed be avoided.\n\nOur population, leaders, and governments have begin work on various projects to pull the seemingly disparate philosophies that have defined these centuries of survival together into a renewed foundation for our planet and society.\n\nIt is expected to take time before these efforts — or our planet — will bear fruit. But we have waited this long.\n\n\n\n§EEOver the next several decades, our undertakings will forever shape the face and future of our homeworld — decisions governing districts, population, industry, and the environment will all determine the outcome of our efforts to rebuild our civilization.\n\nRestoration will occur in three areas:\n - §LIndustrialization§E - A measure of civilization's wealth, productivity, and ability to return to the levels of plentitude required to sustain a true stellar empire. Are we resilient and frugal? Or opulent and utopian?\n - §GEcology§E - Restoring a planetary-scale environment from utter devastation is a mammoth charge. Do we embrace the burnt-out world we've made or rebuild whole rivers and oceans?\n - §YCulture§E - Do we seek to spread fire or influence? Do we seek ruin, or redemption?\n\n§YNo decision is final. Should circumstances change, we can change our decisions and alter the final outcome.§!"

 tbm_hw.102_title:0 "A Glimpse of Our Future"
 tbm_hw.102_desc:0 "It has long been supposed that some [owner.GetSpeciesNamePlural] must have sat upon the burnt shores of our homeworld and wondered what was to come, knowing nothing of the armageddon their future held in wait. For many years, such stories have been an indulgent speculation upon better times — perhaps — while we languish under the shelters, tunnels, and scrap heaps our forebears left behind.\n\nBut now, there is something more tangible to them. For the first time, our people possess the technology — and, more important, the knowledge and understanding — to ask the same, reimagine our world as it once might have been — or yet could be.\n\nMuch of that knowledge has been gleaned from the stars, from worlds so different from our own as to beggar any belief that we could yet repeat the failures of our ancestors.\n\nWe have now another choice — in how we build, in how we rebuild, and in how we remake ourselves into what might have been. Or what might yet come."
 tbm_hw.102_desc_hive:0 "Long years ago, in the annals of the Consciousness that is now less than what it once was, is a memory of a time when we did not possess the knowledge of the armageddon that would befall our world. For many years, such memories have been not so much inaccessible as impractical, forgotten for fear we might yet falter again.\n\nBut now, there is something more tangible to them. For the first time, we possess the technology — and, more important, the knowledge and understanding — to reimagine our world as it once might have been — or yet could be.\n\nMuch of that knowledge has been gleaned from the stars, from worlds so different from our own as to beggar any belief that we could yet repeat such failures.\n\nWe have now another choice — in how we build, in how we rebuild, and in how we remake ourselves into what might have been. Or what might yet come."
 tbm_hw.102_embrace_hope:0 "Embrace the hope of a better future."
 tbm_hw.102_boost_library:0 "§EWe will rely on the knowledge and technology kept in §Y£blocker_yellow£ The Library of Before§E to guide us in restoring our world to its former glory.§!"
 tbm_hw.102_respect_reality:0 "Adapt forever to our new reality."
 tbm_hw.102_boost_chapel:0 "§ESuch reckless dreaming is the surest way to risk all that we have built, as our §Y£blocker_yellow£ Chapel of the Fall§E reminds us.§!"
 tbm_hw.102_society_decides:0 "§EWe will let society take its own corse, come what may.§!"
 tbm_hw.102_follow_instinct:0 "§EWe will follow our instincts in the moment to determine the best course.§!"
 
 tbm_hw.106_title:0 "Post-Apocalyptic — Environmental Restoration - Industry"
 tbm_hw.106_industrialization_low:0 "And so, after so many years and so much effort, the great project has taken shape around us. Once an apocalyptic barren, [owner_main_species.GetHomeWorldName] has undergone tremendous change.\n\nWe have become, in time, resourceful and resilient. We have now truly adapted to life among the ruins of civilization, repurposing, reclaiming, and restoring, if not the glory, than certainly the power of what we once were.\n\nThat same guile will allow us to truly compete with other nations across the stars, no matter our past, no matter our mistakes.\n\nThe hum of the£blocker_yellow£Scrap Bazaars" contrasts the quiet hum of £blocker_yellow£§YAllocation Clinics§!, where essential needs can finally be fulfilled thanks to newfound interstellar wealth.\n\nWhat once we were may not be restored, but we will persevere. We will rise again.\n\nAnd yet...."
 tbm_hw.106_industrialization_mid:0 "And so, after so many years and so much effort, the great project has taken shape around us. Once an apocalyptic barren, [owner_main_species.GetHomeWorldName] has undergone tremendous change.\n\nThe trauma of civilizational collapse has muted to a grey-green reality of upstart ecologies and careful contemplation of the mistakes of the past. From that knowledge, our new wealth emerges. A "£blocker_yellow£§YMemorial of the Apocalypse§! keeps our understanding of the past intact while a shining £blocker_yellow£§YAbyssal Manufactorium§! repurposes the relics of the past for a brighter tomorrow.\n\nTogether, these new developments ensure we retain our past as part of ourselves while joining the true empires amongst the stars.\n\nAnd yet...""
 tbm_hw.106_industrialization_high:0 "And so, after so many years and so much effort, the great project has taken shape around us. Once an apocalyptic barren, [owner_main_species.GetHomeWorldName] has undergone tremendous change.\n\nFrom the ashes, we have built great beacons of prosperity and renewal, and we now prosper in the wealth and power forged from our past failures. £blocker_yellow£§YHegemons of Industry§! ensure our world will become a true industrial titan while in £blocker_yellow£§YPurgatory§! our people can find their every need fulfilled by great holo-projectors built from the rubble of yesteryear. Once a civilization of scarce survival, we are now plentiful.\n\nAnd yet..."
 
 tbm_hw.107_title:0 "Environmental Restoration - Ecology"
 tbm_hw.107_ecology_low:0 "Ash and metal choke our homeworld of [owner_main_species.GetHomeWorldName]. Where nothing lives, nothing may thrive. Now, we have the technology to adapt.\n\nThere can be no return to sunlit shores and gentle hills — ecology is a one-way path. Even if we could restore a more typical planetary atmosphere, it is no longer a given our immune systems could live on it.\n\nInstead, we must embrace what [owner_main_species.GetHomeWorldName] and [owner.GetSpeciesNamePlural] have become. It may be called a §YTomb World§! but we yet live, and upon its dusty, death-scarred landscape, we have made our empire.\n\nFor now, however..."
 tbm_hw.107_ecology_mid:0 "Where ash and metal once choked our homeworld of [owner_main_species.GetHomeWorldName], new life takes root. Shoots of trees now poke through the dust and grime and [owner.GetSpeciesNamePlural] can once more walk outside without masks.\n\nLife will still be difficult here — in some ways, even more difficult than before as our immune systems and infrastructure must be adjusted to a rapidly-changing climate and nascent environment. But what cannot be denied is that this is [owner_main_species.GetHomeWorldName], this is our world, and we have made it anew.\n\nFor now, however..."
 tbm_hw.107_ecology_high:0 "Where once our homeworld was a fallen testament to failures past, now [owner_main_species.GetHomeWorldName] stands anew, restored through careful stewardship and the wonders of advanced technology to much of what it must once have been!\n\nIt is much as the oldest stories say — for [owner.GetSpeciesNamePlural], [owner_main_species.GetHomeWorldName] is as close to a paradise as those from the colonies have ever seen. Gentle shores and calm plains once cradled life, here, and now we must ensure they do so again.\n\nFor now, however...."
 tbm_hw.107_ecology_very_high:0 "Where once our homeworld was a fallen testament to failures past, now [owner_main_species.GetHomeWorldName] stands as one of the true jewels of the galaxy! Every inch of it has been perfected — grime is now garden, ash is now arable soil, and even the dusty plains of a now-bygone age have become pleasant plains stirred by a gentle breeze that is never more than comfortable. All signs of fire and fallout have been so thoroughly scrubbed that it now shines as brightly as each [owner.GetSpeciesMouthName]."\n\nFor now, however...""
 
 tbm_hw.108_title:0 "Environmental Restoration - Culture"
 tbm_hw.108_culture_low:0 "Our attention now turns to the stars. We have learned hard that [owner_main_species.GetHomeWorldName] cannot provide for us. The stars, however, can — even as their darkness hideas future threats, so we are now a society capable of facing them, and besting them.\n\nHideous mutations have strengthened our soldiers and our scrap traders pull frightful weapons systems from the rubble of our past, turning them to our future security and success. We do not need what has gone before — [owner.GetName] will forge a new tomorrow.\n\nSo stands [owner_main_species.GetHomeWorldName], in all its glory. All it ever needed to be. Its fall is now complete, its restoration shaped by our needs and purposes to be fittingly called our new homeworld."
 tbm_hw.108_culture_mid:0 "Our restoration of [owner_main_species.GetHomeWorldName] has been matched by renewed vigor amongst our people. The collective effort has led to greater togetherness and pride in our accomplishment, as even the older civilizations of the galaxy have taken notice. Through our hardship, they can learn much, just as we have learned, and together, we can lead the galaxy to true greatness.\n\nSo stands [owner_main_species.GetHomeWorldName], in all its glory. All it ever needed to be. Its fall is now complete, its restoration shaped by our needs and purposes to be fittingly called our new homeworld."
 tbm_hw.108_culture_high:0 "Our homeworld now serves as a pathway for all war-torn worlds and their inhabitants to rebuild their homes into bountiful utopias. Tourists flock to [owner_main_species.GetHomeWorldName] from across the stars to marvel at the achievements of our culture and our collective unity of purpose and passion. Without these, [owner.GetName] would be clining to survival in every moment; instead, we stride out as champions of the galaxy, beacons of what can be accomplished if we leave behind mistakes of the past.\n\nSo stands [owner_main_species.GetHomeWorldName], in all its glory. All it ever needed to be. Its fall is now complete, its restoration shaped by our needs and purposes to be fittingly called our new homeworld."


 ### Scavenger Bands Declare War - Post-Apoc Origin event

 tbm_hw.212_name:0 "Scavenger Bands Declare War"
 tbm_hw.212_desc:0 "Fiercely competitive, the two major £blocker_yellow£ §YScavenger Bands§! on §S[planet.GetName] scrap over every part and plate they can salvage from the crumbling wrecks of civilization. It's dangerous work for those brave enough to risk life and limb out on the radioactive wastes.\n\nNow, after a romantic falling-out between two rival clan-members, the leaders of each band have announced lucrative prices -- on each other. Their always-heavily-armed underlings are going at it with great gusto, seeking recognition and renown among the squalid remains of [owner.GetAdj] society.\n\nIt's unclear if there's any real possibility of a lull in the fighting. For now, it's been mostly confined to the bleaker camps but the betting markets are making a windfall and security forces are worried about a total loss of control if clashes escalate."

 tbm_hw.212_bounties:0 "Buy a peace with higher bounties."
 tbm_hw.212_bounties_tooltip:0 "§YThis will stop the fighting but it will be much more difficult to get rid of £blocker_yellow£ §YScavenger Bands in the future.§!"
 tbm_hw.212_elimination:0 "Eliminate one of the leaders."
 tbm_hw.212_elimination_tooltip:0 "§YThis will buy the surviving leader's undying loyalty, but will require a risky operation.§!"
 tbm_hw.212_security:0 "Heighten security until this blows over."
 tbm_hw.212_conquest_tooltip:0 "one £blocker_yellow£ §YScavenger Band§! conquers the other."
 tbm_hw.212_unification_tooltip:0 "the war between the £blocker_yellow£ §YScavenger Bands§! escalates."

 tbm_hw.212_clearance:0 "Clearing either one of the £blocker_yellow£ §YScavenger Bands§! will be considerably more difficult until the war is resolved."

 tbm_hw.213_name:0 "Scavenger Conquest"
 tbm_hw.213_desc:0 "After months of clashes in the [planet.GetPlanetMoon]'s darker tunnels, one of §S[planet.GetName]'s £blocker_yellow£ §YScavenger Bands§! has succeeeded in conquering the other. Although the spate of public and violent executions haseen unsettling for many, the surviving £blocker_yellow£ §YScavenger Band§! has promised local administrators it will keep the peace and, more importantly, maintain mineral quotas.\n\nHowever, there have been noticeable grumbles from parts merchants and their local miners about extortionate \"dues\" charged by the surviving band for participation in its dubiously-regulated market."
 tbm_hw.213_dust_settled:0 "It seems the dust has settled."
 tbm_hw.213_conquest_tooltip:0 "£blocker_yellow£ §YSScavenger Bands§! will provide -1 £minerals£ §district_mining_plural§! and £miners£ $job_miner_plural$ will have §R+1§! §Y$energy$§! upkeep.\n\n£blocker_yellow£ §SSScavenger Bands§! will also generate some £crime£ §Y$PLANET_CRIME_TITLE$§!."

 tbm_hw.214_name:0 "Scavenger Unification"
 tbm_hw.214_desc:0 "After months of intense fighting between §S[planet.GetName]'s rival £blocker_yellow£ §CScavenger Bands§!, a tense stand-off between each gang's leaders broke unlikely ground. It seems all involved harbor a certain disdain for centralized authority and, particularly, the excessive inspections by [owner.GetAdj] security forces.\n\nThe ensuing unified assault took us by surprise, disabling critical command posts and spiralled out of control from there. Frenzied and fallout-ridden fighters scrambled through the capital in search of launch codes, valuable alloys, and any scrap they could sell. The only upside is that both scavenger leaders have been killed during the engagement, and under threat of military retaliation, their underlings have agreed to a peace deal that should, in time, see a modicum of normalcy return to §Y[planet.GetName]§! and its mineral markets."

 tbm_hw.215_name:0 "Scavenger Lord Assassinated"
 tbm_hw.215_desc:0 "Security forces on §Y[planet.GetName]§! have spent the past months planning a careful assassination attempt on the more vulnerable leader of [planet.GetPlanetMoon]'s two warring £blocker_yellow£ §YScavenger Bands§!.\n\nThe operation was set in motion this morning, and word has now reached more civilized [owner.GetSpeciesNamePlural] that the attempt was successful, and what remains of one £blocker_yellow£ §YScavenger Band§!  has been quickly absorbed by the other. Although local officials are maintaining plausible deniability, the surviving band is sufficiently grateful to agree to disarmanent and increased oversight. Mineral shipments are expected to resume next month."

 tbm_hw.216_name:0 "Scrao Shoot-out"
 tbm_hw.216_desc:0 "Security forces on §Y[planet.GetName]§! have spent the past months planning a careful assassination attempt on the more vulnerable leader of [planet.GetPlanetMoon]'s two warring £blocker_yellow£ §YScavenger Bands§!.\n\nHowever, when the operation was set in motion this morning, the leader of the larger £blocker_yellow£ §YScavenger Band§!, facing imminent execution at the hands of [leader.GetHerHis] rivals, revealed [leader.GetHerHim]self to be [leader.GetName]. It seems [leader.GetSheHe] has been secretly running the £blocker_yellow£ §YScavenger Band§!d for some time now. Before communications could be re-established with operatives in the field, the assassination was carried out and [leader.GetName] successfully terminated.\n\nThe embarrassment humbled the surviving £blocker_yellow£ §YScavenger Band§! enough to stop the fighting and its leaders are sufficiently grateful to agree to disarmanent and increased oversight. Mineral shipments are expected to resume next month."

 tbm_hw.51_name:0 "Food Replicators Malfunctioning"
 tbm_hw.51_desc:0 "In §Y[planet.GetName]'s§! prime, it would have sustained billions, maybe trillions, of [owner.GetSpeciesNamePlural] with its immense and ancient §YFood Replicators§!. For as long as we've studed these relics of a better age, they've been slowly failing, and [owner.GetAdj] [owner.GetScientistPlural] still don't understand how the machines work, let alone how to restore them to their former glory.\n\nIn the past few weeks, several increasingly acute malfunctions have sent waves of concern through our cities. The [planet.GetPlanetMoon]'s ecosystem is still far from able to support widespread agriculture, and some dissidents have even seen fit to critique our forebears for their over-reliance on this arcane technology.\n\nWhatever anyone thinks, the technicians working on the §YFood Replicators§! are unable to provide any satisfying answers. For now, the magical machines of past plenty continue to squeeze out palatable food. For how much longer that will be the case, no one knows."
 tbm_hw.51_gestalt_desc:0 "In §Y[planet.GetName]'s§! prime, it would have sustained billions, maybe trillions, of [owner.GetSpeciesNamePlural] with its immense and ancient §YFood Replicators§!. For as long as we've used and studied these relics of a better age, they've been slowly failing, and [owner.GetScientistPlural] still don't understand how the machines work, let alone how to restore them to their full functionality.\n\nSeveral especially acute malfunctions have sent waves of concern through the organism. The [planet.GetPlanetMoon]'s ecosystem is still far from able to support widespread agriculture and the drones working on the §YFood Replicators§! are unable to provide any analysis or solution. For now, the machines of past plenty continue to squeeze out effective food. For how much longer that will be the case is unknown."
 
 tbm_hw.52_name:0 "Food Replicators Fail"
 tbm_hw.52_desc_gestalt:0 "After months of creaking malfunctions and millennia more without proper maintenance, the ancient §YFood Replicators§! on our homeworld have finally ground to a stop, leaving hundreds of thousands of drones without efficient access to food.\n\nAlthough efforts to develop agricutlural regions across the planet expand every year, it seems unlikely that §Y[planet.GetName]§! will ever produce enough food to sustain its peak population.\n\nIncreasingly, it seems that we must turn to the stars to secure adequate nutrition for our growth."
 tbm_hw.52_desc:0 "After months of creaking malfunctions and millennia more without proper maintenance, the ancient §YFood Replicators§! on our homeworld have finally ground to a stop, their quiet, whir no longer reassuring [owner.GetSpeciesClassPlural] of an easy, nutritious meal.\n\nAlthough efforts to develop agricutlural regions across the planet expand every year, it seems unlikely that §Y[planet.GetName]§! will ever produce enough food to sustain its peak population. Increasingly, [owner.GetSpeciesAdj] turn their eyes to the stars, again dreaming of the comforts of bounty and wealth that once made §Y[planet.GetName]§! a true city of the world."
 tbm_hw.52_promise:0 "One day, perhaps...."

 


 ### Static Modifiers

 beacon_of_hope:0 "Beacon of Hope"
 beacon_of_hope_desc:0 "Pioneers flock to work £blocker£ §CFrontier Famrsteads§! on this world, hoping to send their bounty back to those starving on the homeworld."

 colonial_bounty:0 "Colonial Bounty"
 colonial_bounty_desc:0 "Regular food shipments from off-world have lifted the mood on our homeworld."

 colonial_tithes:0 "Colonial Food Tithes"
 colonial_tithes_desc:0 "Farmers on this world must pledge some of their crops to support the homeworld."

 eased_tithes:0 "Eased Food Tithes"
 eased_tithes_desc:0 "Farmers on this world are happy to pledge a small amount of their crops to ensure the homeworld doesn't starve."

 autocannibalistic_hive:0 "The hive is destroying itself to survive. Life is a closed system."

 starvation_state:0 "The government has failed to provide for the people, and all that remains is the husk of civilization. It will take years for those who survive to rebuild society."

 convenient_scapegoats:0 "Decision-making has been left to those with enough to survive. Mob rule is rampant. Only the strongest survive, and even then only for a while. There is always someone looking for a meal."

 nutritious_cockroaches:0 "Having survived the fall of civilization once, the cockroaches may know something we don't. However, they are not going to survive the fall of civilization again."

 council_cannibalism:0 "The council decides who eats and who dies. Nobody said it was an easy job."

 scavenger_wars:0 "Scavenger Wars"
 scavenger_wars_desc:0 "Two rival £blocker_yellow£ §CScavenger Bands§! have declared a particularly nasty turf war, fueling crime all over the planet."

 scavenger_bounties:0 "Scavenger Bounties"
 scavenger_bounties_desc:0 "As part of a ceasefire agreement, the government now pays higher parts bounties to both major £blocker_yellow£ §CScavenger Bands§!."

 failing_food_replicator:0 "Failing Food Replicator"
 failing_food_replicator_desc:0 "The Food Replicators that have long sustained our homeworld's population are starting to fail."


 environmental_remediation:0 "REPLACE_ME"
 tbm_environmental_remediation_title:0 "REPLACE_ME"

 pc_nuked_tbm:0 "REPLACE_ME"
 pc_nuked_tbm_desc:0 "REPLACE_ME"
 pc_nuked_tbm_adj:0 "REPLACE_ME"
 mod_pc_nuked_tbm_habitability:0 "REPLACE_ME"

 advancing_from_ruins:0 "Advancing from Ruin"
 advancing_from_ruin_desc:0 "This civilization has embraced the resilience and resourcefulness needed to survive the fall of its homeworld and has emerged from the Apocalypse stronger and more sure of its galactic footing."

 revived_civilization:0 "Revived Civilization"
 revived_civilization:0 "This civilization has restored much of what was lost in the Apocalypse, reclaiming the knowledge and technology of times gone before."

 cultural_reconstruction:0 "Cultural Reconstruction"
 
 cultural_restoration_planet:0 "Cultural Restoration"
 cultural_restoration_planet_desc:0 "This civilization has forged a shining culture from seeds kept sheltered through the Apocalypse, emerging as a great galactic power humbled but not haunted by its past." 

 cultural_restoration:0 "Cultural Restoration"

 mutant_soldiers:0 "Mutant Soldiers"

 building_museum_apocalypse:0 "Museum of the Apocalypse"
 building_museum_apocalypse_desc:0 "This institution cradles all the most important knowledge of what once befell this planet in an effort to ensure such disaster never strikes again."

 building_laboratory_apocalypse:0 "Laboratory of Survival"
 building_laboratory_apocalypse_desc:0 "Survivalism should be seen less as ideology and more as an art, one merged perfectly with science to ensure the best possible chance for all those born on this broken world."

 building_cathedral_apocalypse:0 "Cathedral of the Fall"
 building_cathedral_apocalypse_desc:0 "A true testamednt to the peril of grand designs, a grim reminder that all civilization teeters on the brink of disaster."