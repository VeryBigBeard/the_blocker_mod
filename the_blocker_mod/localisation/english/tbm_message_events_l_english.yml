l_english: 

 ### The Blocker Mod - Message Events
 #   Used for notifications for dynamic features - see tbm_message_events and tbm_handler_events
 
 # Handlers & Generators

 MESSAGE_SLUM_GENERATOR_TITLE:0 "New £blocker£ §YSprawling Slums§!"
 SLUM_GENERATOR:0 "Cramped and difficult living conditions on §S[planet.GetName]§! have given rise to new £blocker£ §YSprawling Slums§! around the [planet.GetPlanetMoon]'s cities'.\n\nIf left to fester, these may affect happiness and approval. To avoid future slums, improve local conditions by adding amenities and housing."

 MESSAGE_INDUSTRIAL_WASTELAND_TITLE:0 "New £blocker£ §YIndustrial Wasteland§! appeared"
 INDUSTRIAL_WASTELAND:0 "Chased away by declining local conditions and a poor economy, businesses and industries are abandoning §S[planet.GetName]§! in droves, leaving £blocker£ §YIndustrial Wasteland§! behind.\n\nThese derelict regions are dens of crime and terrible polluters. To avoid future wastelands, improve local conditions by adding amenities and reducing crime."

 MESSAGE_URBAN_POWER_PLANT_TITLE:0 "A new £blocker£ §YUrban Power Plant§! has opened" 
 URBAN_POWER_PLANT:0 "The growing urban area on §S[planet.GetName]§! has long exceeded the planet's own energy supply, and shipments from off-world aren't enough. Local planners have authorized construction of a new £blocker£ §YUrban Power Plant§! in the heart of the [planet.GetPlanetMoon]'s largest mega-city to meet ballooning energy needs.\n\nAn £blocker£ §YUrban Power Plant§! will allow additional $district_generator$ development, but eat up space and make noisy neighbors. To avoid these unsightly behemoths, ensure the planet has a good ratio of $district_generator_plural$ to $district_industrial_plural$ and $district_city_plural$."

 MESSAGE_COLONIAL_SETTLEMENT_TITLE:0 "A new £blocker£ §YPioneer Settlement§! appeared"
 COLONIAL_SETTLEMENT:0 "Enterprising pioneers on §S[planet.GetName]§! have discovered and settled in a rich region on the frontier seeking new and prosperous lives.\n\nAlthough £blocker£ §YPioneer Settlements§! attract all kinds, the £colonist£ §CColonists§! there will help explore and exploit the local terrain. These settlements are more likely on worlds with extra district space and a growing population."

 MESSAGE_FRONTIER_FARMLAND_TITLE:0 "New £blocker£ §YFrontier Farmland§! has been granted"
 FRONTIER_FARMLAND:0 "Ranchers and farmers are flocking to §Y[planet.GetName]§! in search of new lands and new lives, establishing§T Frontier Farmlands§! in outlying regions.\n\nThese homesteads require ample space for grazing and cultivation, but will help provide£T $district_farming_plural$. These farms are more likely to be created on worlds with lots of free space or ideal grazing conditions."

 MESSAGE_DUSTBOWL_GENERATOR_TITLE:0 "A new £blocker£§YDustbowl§! has developed"
 message_dustbowl_generator:0 "What was once prime farmland on [planet.GetName] has become a dry and lifeless §Y£blocker£ Dustbowl§!. Dust and minerals blow through dessicated wasteland air and very little grows here now.\n\nWhile there could be any number of causes, over-farming is the likeliest culprit."

 MESSAGE_LANDSLIDE_TITLE:0 "Landslide"
 message_landslide:0 "After heavy rains, landslides have washed away settlements and resource infrastructure on §Y[planet.GetName]§!.\n\nThe collapse may provide mining opportunities once the dust has settled."

 MESSAGE_SUDDEN_SINKHOLE_TITLE:0 "§Y£blocker£Sudden Sinkhole§!" 
 tbm.message.sinkhole:0 "Despite our best efforts, a new §Y£blocker£Deep Sinkhole§! has appeared on [planet.GetName][sinkhole_destruction].\n\nThe exact cause of these sinkholes remains unknown and it has so far been impossible to predict the next location to be affected. All we can do is fill them again and hope they stay filled."

 MESSAGE_SANDSTORM_TITLE:0 "Vicious Sandstorm"
 message_sandstorm:0 "A wild sandstorm has rolled in over a major city on §Y[planet.GetName]§!, destroying energy infrastructure.\n\n§YSandstorms occur naturally, but will be less frequent when a planet has more trees."

 
 tbm_message_mine_shaft_collapse_robot_casaulties:0 "A mine shaft at the §Y£blcoker£[collapsed_mine]§! on [planet.GetName] has collapsed, trapping several robotic mining units inside. Fortunately, there has been no loss of life, but the mining units will have to be replaced."
 tbm_message_mine_shaft_collapse_miners_dead:0 "A mine shaft at the §Y£blcoker£[collapsed_mine]§! on [planet.GetName] has collapsed, trapping several miners below the surface."

