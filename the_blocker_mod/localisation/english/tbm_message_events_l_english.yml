 tbm.message.sinkhole:0 "Despite our best efforts, a new В§YВЈblockerВЈDeep SinkholeВ§! has appeared on [planet.GetName][sinkhole_destruction].\n\nThe exact cause of these sinkholes remains unknown and it has so far been impossible to predict the next location to be affected. All we can do is fill them again and hope they stays filled."

 
