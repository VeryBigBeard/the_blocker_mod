 # Handlers & Generators

 MESSAGE_SLUM_GENERATOR_TITLE:0 "New ВЈblockerВЈ В§YSprawling SlumsВ§! appeared on [from.GetName]"
 SLUM_GENERATOR:0 "Cramped and difficult living conditions on В§S[planet.GetName]В§! have given rise to new ВЈblockerВЈ В§YSprawling SlumsВ§! around the [planet.GetPlanetMoon]'s cities'.\n\nIf left to fester, these may affect happiness and approval. To avoid future slums, improve local conditions by adding amenities and housing."

 MESSAGE_INDUSTRIAL_WASTELAND_TITLE:0 "New ВЈblockerВЈ В§YIndustrial WastelandВ§! appeared on [from.GetName]"
 INDUSTRIAL_WASTELAND:0 "Chased away by declining local conditions and a poor economy, businesses and industries are abandoning В§S[planet.GetName]В§! in droves, leaving ВЈblockerВЈ В§YIndustrial WastelandВ§! behind.\n\nThese derelict regions are dens of crime and terrible polluters. To avoid future wastelands, improve local conditions by adding amenities and reducing crime."

 MESSAGE_URBAN_POWER_PLANT_TITLE:0 "A new ВЈblockerВЈ В§YUrban Power PlantВ§! has opened on [from.GetName]" 
 URBAN_POWER_PLANT:0 "The growing urban area on В§S[planet.GetName]В§! has long exceeded the planet's own energy supply, and shipments from off-world aren't enough. Local planners have authorized construction of a new ВЈblockerВЈ В§YUrban Power PlantВ§! in the heart of the [planet.GetPlanetMoon]'s largest mega-city to meet ballooning energy needs.\n\nAn ВЈblockerВЈ В§YUrban Power PlantВ§! will allow additional $district_generator$ development, but eat up space and make noisy neighbors. To avoid these unsightly behemoths, ensure the planet has a good ratio of $district_generator_plural$ to $district_industrial_plural$ and $district_city_plural$."

 MESSAGE_COLONIAL_SETTLEMENT_TITLE:0 "A new ВЈblockerВЈ В§YPioneer SettlementВ§! appeared on [from.GetName]"
 COLONIAL_SETTLEMENT:0 "Enterprising pioneers on В§S[planet.GetName]В§! have discovered and settled in a rich region on the frontier seeking new and prosperous lives.\n\nAlthough ВЈblockerВЈ В§YPioneer SettlementsВ§! attract all kinds, the ВЈcolonistВЈ В§CColonistsВ§! there will help explore and exploit the local terrain. These settlements are more likely on worlds with extra district space and a growing population."

 MESSAGE_FRONTIER_FARMLAND_TITLE:0 "New ВЈblockerВЈ В§YFrontier FarmlandВ§! has been granted on [from.GetName]"
 FRONTIER_FARMLAND:0 "Ranchers and farmers are flocking to В§Y[planet.GetName]В§! in search of new lands and new lives, establishingВ§T Frontier FarmlandsВ§! in outlying regions.\n\nThese homesteads require ample space for grazing and cultivation, but will help provideВЈT $district_farming_plural$. These farms are more likely to be created on worlds with lots of free space or ideal grazing conditions."

 MESSAGE_DUSTBOWL_GENERATOR_TITLE:0 "A new ВЈblockerВЈВ§YDustbowlВ§! has developed on [planet.GetName]"
 message_dustbowl_generator:0 "What was once prime farmland on [planet.GetName] has become a dry and lifeless В§YВЈblockerВЈDustbowlВ§!. Dust and minerals blow through dessicated wasteland air and very little grows here now.\n\nWhile there could be any number of causes, over-farming is the likeliest culprit."

 MESSAGE_LANDSLIDE_TITLE:0 "Landslide on В§Y[planet.GetName]В§!"
